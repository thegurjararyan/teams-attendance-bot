<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width: 270px;
    background: #09090b;
    color: #e4e4e7;
    font-family: 'Segoe UI', sans-serif;
    padding: 16px;
  }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; padding-bottom: 12px;
    border-bottom: 1px solid #18181b;
  }
  .header-left { display:flex; align-items:center; gap:8px; }
  .header-title { font-size:13px; font-weight:600; color:#e4e4e7; }
  .header-sub { font-size:10px; color:#52525b; margin-top:1px; }

  /* Status pill */
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 500;
    padding: 3px 8px; border-radius: 20px;
    border: 1px solid #27272a;
  }
  .pill.on  { color:#22c55e; border-color:#14532d; background:#052e16; }
  .pill.off { color:#52525b; border-color:#27272a; background:#18181b; }
  .pill-dot {
    width:5px; height:5px; border-radius:50%;
    background: currentColor;
  }
  .pill.on .pill-dot { animation: blink 1.8s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Status cards row */
  .cards { display:flex; gap:6px; margin-bottom:12px; }
  .card {
    flex:1; background:#18181b; border:1px solid #27272a;
    border-radius:8px; padding:8px 10px;
  }
  .card-label { font-size:9px; color:#52525b; text-transform:uppercase; letter-spacing:0.6px; margin-bottom:4px; }
  .card-value { font-size:11px; color:#a1a1aa; font-weight:500; }
  .card-value.green { color:#22c55e; }
  .card-value.yellow { color:#eab308; }
  .card-value.muted { color:#3f3f46; }

  /* Buttons */
  .btn {
    width:100%; padding:9px; border-radius:7px; border:none;
    font-size:12px; font-weight:600; cursor:pointer;
    letter-spacing:0.3px; transition: all 0.15s;
    margin-bottom:6px;
  }
  .btn-primary   { background:#27272a; color:#e4e4e7; }
  .btn-primary:hover { background:#3f3f46; }
  .btn-danger    { background:#450a0a; color:#ef4444; border:1px solid #7f1d1d; }
  .btn-danger:hover { background:#7f1d1d; }
  .btn-success   { background:#052e16; color:#22c55e; border:1px solid #14532d; }
  .btn-success:hover { background:#14532d; }
  .btn-ghost     { background:transparent; color:#52525b; border:1px solid #27272a; }
  .btn-ghost:hover { color:#a1a1aa; border-color:#3f3f46; }

  /* Toggle row */
  .toggle-row {
    display:flex; align-items:center; justify-content:space-between;
    background:#18181b; border:1px solid #27272a;
    border-radius:7px; padding:9px 12px; margin-bottom:6px;
  }
  .toggle-label { font-size:11px; color:#71717a; }
  .switch { position:relative; width:34px; height:18px; flex-shrink:0; }
  .switch input { opacity:0; width:0; height:0; }
  .slider {
    position:absolute; cursor:pointer; top:0;left:0;right:0;bottom:0;
    background:#27272a; border-radius:18px; transition:0.2s;
  }
  .slider:before {
    position:absolute; content:""; height:12px; width:12px;
    left:3px; bottom:3px; background:#71717a; border-radius:50%; transition:0.2s;
  }
  input:checked + .slider { background:#1d4ed8; }
  input:checked + .slider:before { transform:translateX(16px); background:white; }

  /* Divider */
  .divider { border:none; border-top:1px solid #18181b; margin:10px 0; }

  /* Simulate input */
  .sim-row { display:flex; gap:6px; margin-bottom:6px; }
  .sim-input {
    flex:1; background:#18181b; border:1px solid #27272a;
    border-radius:7px; color:#e4e4e7; font-size:11px;
    padding:8px 10px; font-family:'Segoe UI',sans-serif;
  }
  .sim-input:focus { outline:none; border-color:#3f3f46; }
  .sim-input::placeholder { color:#3f3f46; }
  .sim-btn {
    padding:8px 12px; border-radius:7px; border:1px solid #27272a;
    background:#18181b; color:#71717a; font-size:11px;
    cursor:pointer; white-space:nowrap; transition:all 0.15s;
  }
  .sim-btn:hover { background:#27272a; color:#a1a1aa; }

  /* Keywords */
  .section-label {
    font-size:9px; color:#3f3f46; text-transform:uppercase;
    letter-spacing:0.8px; margin-bottom:6px; display:block;
  }
  textarea {
    width:100%; background:#18181b; border:1px solid #27272a;
    border-radius:7px; color:#a1a1aa; font-size:11px;
    padding:8px 10px; resize:none; height:72px;
    font-family:'Segoe UI',sans-serif; line-height:1.6;
  }
  textarea:focus { outline:none; border-color:#3f3f46; }

  /* Footer */
  .footer {
    margin-top:12px; padding-top:10px;
    border-top:1px solid #18181b;
    display:flex; justify-content:space-between; align-items:center;
  }
  .footer-brand { font-size:10px; color:#27272a; }
  .footer-brand span { color:#3f3f46; }
  .footer-version { font-size:10px; color:#27272a; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div>
      <div class="header-title">Attendance Alert</div>
      <div class="header-sub">teams.microsoft.com</div>
    </div>
  </div>
  <div class="pill on" id="monitorPill">
    <div class="pill-dot"></div>
    <span id="pillText">Active</span>
  </div>
</div>

<!-- Status cards -->
<div class="cards">
  <div class="card">
    <div class="card-label">Captions</div>
    <div class="card-value muted" id="captionStatus">Inactive</div>
  </div>
  <div class="card">
    <div class="card-label">Last Alert</div>
    <div class="card-value muted" id="lastAlertTime">—</div>
  </div>
  <div class="card">
    <div class="card-label">Keywords</div>
    <div class="card-value green" id="kwStatus">On</div>
  </div>
</div>

<!-- Main toggle -->
<button class="btn btn-danger" id="toggleBtn">Pause Monitoring</button>

<!-- Keywords toggle -->
<div class="toggle-row">
  <span class="toggle-label">Keyword detection</span>
  <label class="switch">
    <input type="checkbox" id="kwToggle" checked>
    <span class="slider"></span>
  </label>
</div>

<hr class="divider">

<!-- Test + Simulate -->
<button class="btn btn-ghost" id="testBtn">🔔 Test Alert</button>

<div class="sim-row">
  <input class="sim-input" id="simInput" type="text" placeholder="Simulate message, e.g. 1f716eb4">
  <button class="sim-btn" id="simBtn">Run</button>
</div>

<hr class="divider">

<!-- Keywords -->
<span class="section-label">Keywords</span>
<textarea id="keywordsInput">attendance
code
mark
present
portal
submit
fill</textarea>
<button class="btn btn-ghost" id="saveBtn" style="margin-top:6px">Save Keywords</button>

<!-- Footer -->
<div class="footer">
  <span class="footer-brand">by <span>@thegurjararyan</span></span>
  <span class="footer-version">v2.0</span>
</div>

<script src="popup.js"></script>
</body>
</html>
